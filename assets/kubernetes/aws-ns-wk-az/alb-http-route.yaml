apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: go-clearance-wk-az-route
  namespace: wk-az
  labels:
    app: go-clearance-wk-az-route
spec:
  hostnames:
    - "go-clearance-aws-wk-az.architecturedev.caradhras.io"
  parentRefs:
    - name: alb-arch-eks-002-gateway
      namespace: test-a
      sectionName: http-listener
    - name: alb-arch-eks-002-gateway
      namespace: test-a
      sectionName: https-listener
  rules:
    - matches:
      - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: svc-go-clearance
          port: 7003
          namespace: wk-az